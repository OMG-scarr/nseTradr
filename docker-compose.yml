services:
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=@dmin123
      - GENERIC_TIMEZONE=Africa/Nairobi
      - TZ=Africa/Nairobi
    volumes:
      - n8n_data:/home/node/.n8n
      - /home/omg-scarr/Documents/nseTradr/bin:/opt/nseTradr/bin
      - /home/omg-scarr/Documents/nseTradr/credentials.json:/opt/nseTradr/credentials.json
      - /home/omg-scarr/Documents/nseTradr/.env:/opt/nseTradr/.env
      - /home/omg-scarr/Documents/nseTradr/logs:/opt/nseTradr/logs

  nse-api:
    image: ubuntu:22.04
    ports:
      - "8080:8080"
    volumes:
      - /home/omg-scarr/Documents/nseTradr/bin:/opt/nseTradr/bin
      - /home/omg-scarr/Documents/nseTradr/credentials.json:/opt/nseTradr/credentials.json
      - /home/omg-scarr/Documents/nseTradr/.env:/opt/nseTradr/.env
      - /home/omg-scarr/Documents/nseTradr/logs:/opt/nseTradr/logs
    command: /opt/nseTradr/bin/nseTradr serve
    restart: unless-stopped

volumes:
  n8n_data: