services:
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=@dmin123
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount the compiled binary into the container
      - /home/omg-scarr/nseTradr/bin:/opt/nse-trader/bin
      # Mount secrets and credentials
      - /home/omg-scarr/nseTradr/credentials.json:/opt/nse-trader/credentials.json
      - /home/omg-scarr/nseTradr/.env:/opt/nse-trader/.env
      # Mount logs so both host and container share the same log file
      - /home/omg-scarr/nseTradr/logs:/opt/nse-trader/logs

volumes:
  n8n_data: